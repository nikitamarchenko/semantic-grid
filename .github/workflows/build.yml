name: Build

on:
  schedule:
    - cron: "29 20 * * *"
  push:
    branches:
      - "main"
      - "integration-gh-actions"

    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  db-meta-build:
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      component-name: db-meta
      docker-file: ./apps/db-meta/Dockerfile
